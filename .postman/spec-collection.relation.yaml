# This section maps specification-collection pairs that are linked and used for syncing them with each other.
# The Paths are relative to the .postman directory (avoid absolute paths).
# Keep one entry per spec + collection pair.
# The `syncOptions` object stores specification-collection syncing options.
relations:
  - spec: ../contract/index.yaml
    collection: ../postman/collections/User API - Integration Test
    syncOptions:
      syncExamples: false
  - spec: ../contract/index.yaml
    collection: ../postman/collections/UserAPI - Documentation
    syncOptions:
      syncExamples: false
