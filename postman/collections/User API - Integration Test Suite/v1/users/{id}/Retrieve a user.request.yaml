$kind: http-request
url: "{{baseUrl}}/v1/users/:id"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: "{{id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer",
            "default": "<integer>"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: text
  content: ""
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
    language: text/javascript
examples: ./.resources/Retrieve a user.resources/examples
order: 1000
