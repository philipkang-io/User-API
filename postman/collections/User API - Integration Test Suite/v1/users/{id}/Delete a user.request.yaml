$kind: http-request
name: Delete a user
url: "{{baseUrl}}/v1/users/:id"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: "{{id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: text
  content: ""
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
    language: text/javascript
examples: ./.resources/Delete a user.resources/examples
order: 3000
