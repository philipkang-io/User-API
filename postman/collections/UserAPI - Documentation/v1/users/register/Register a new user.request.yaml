$kind: http-request
description: |-
  # Register a new user

  Creates a new user account in the system. This endpoint accepts a username and password, validates the input, and creates a new user record. Upon successful registration, the API returns the newly created user's information.

  ## Endpoint

  `POST {{baseUrl}}/v1/users/register`

  ## Headers

  | Header | Value | Required | Description |
  | --- | --- | --- | --- |
  | `Content-Type` | `application/json` | Yes | Specifies that the request body is JSON. |
  | `Accept` | `application/json` | Yes | Indicates that the client expects a JSON response. |

  ## Request Body

  The request body must be a JSON object with the following properties:

  | Field | Type | Required | Description |
  | --- | --- | --- | --- |
  | `username` | string | Yes | The unique username for the new account. |
  | `password` | string | Yes | The password for the new account. Should meet your application's password complexity requirements. |

  ### Example Request Body

  ```json
  {
    "username": "jdoe",
    "password": "S3cureP@ssw0rd!"
  }
  ```

  ## Responses

  | Status Code | Description |
  | --- | --- |
  | `201 Created` | The user was successfully registered. The response body contains the new user's details. |
  | `400 Bad Request` | The request body is malformed or missing required fields. |
  | `409 Conflict` | A user with the provided username already exists. |
  | `500 Internal Server Error` | An unexpected error occurred on the server. |

  ## Environment Variables

  - `{{baseUrl}}` — The base URL of the User API (defined in the active environment).

  ## Notes

  - Passwords are never returned in the response.
  - Usernames are case-sensitive and must be unique.
url: "{{baseUrl}}/v1/users/register"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "username": "string",
      "password": "string"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "username": {
          "type": "string"
        },
        "password": {
          "type": "string"
        }
      }
    }
examples: ./.resources/Register a new user.resources/examples
order: 1000
