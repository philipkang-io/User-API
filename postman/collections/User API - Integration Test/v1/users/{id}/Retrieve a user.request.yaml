schemaVersion: "3.0"
name: Retrieve a user
type: http
url: "{{baseUrl}}/v1/users/:id"
method: GET
headers:
  Accept: application/json
pathVariables:
  id: "{{id}}"
body:
  type: text
  content: ""
scripts:
  - type: afterResponse
    code: |+
      pm.test("Status code is 200", function () {
        pm.response.to.have.status(200);
      });

    language: text/javascript
order: 1000
