schemaVersion: "3.0"
url: http://{{baseUrl}}/v1/users/:id
method: PUT
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
  - key: X-API-Key
    value: <API Key>
    description: "Added as a part of security scheme: apikey"
pathVariables:
  id: "5781"
body:
  type: text
  content: |-
    {
      "username": "string",
      "password": "string"
    }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "string"
      }
order: 1000
