schemaVersion: "3.0"
name: Log in a user
type: http
url: "{{baseUrl}}/v1/users/login"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "username": "{{username}}",
      "password": "{{password}}"
    }
scripts:
  - type: afterResponse
    code: |+
      pm.test("Status code is 200", function () {
        pm.response.to.have.status(200);
      });

    language: text/javascript
order: 1000
