schemaVersion: "3.0"
name: Log in a user
type: http
url: http://{{baseUrl}}/v1/users/login
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: text
  content: |-
    {
      "username": "{{username}}",
      "password": "{{password}}"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 201", function () {
        pm.response.to.have.status(201);
      });
    language: text/javascript
order: 1000
