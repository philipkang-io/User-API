schemaVersion: "3.0"
url: http://{{baseUrl}}/v1/users/register
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
  - key: X-API-Key
    value: <API Key>
    description: "Added as a part of security scheme: apikey"
body:
  type: text
  content: |-
    {
      "username": "string",
      "password": "string"
    }
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": 1523,
        "username": "string",
        "token": "string"
      }
order: 1000
